<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Image Studio</title>
  <link rel="stylesheet" href="/components/storage-panel.css" />
  <style>
    :root {
      --bg: #f7f8fb;
      --card: rgba(255, 255, 255, .86);
      --card-solid: #ffffff;
      --soft: #f1f3f7;
      --line: #e4e7ee;
      --line-strong: #d7dce6;
      --text: #161922;
      --muted: #687083;
      --faint: #98a1b3;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --ok: #16a34a;
      --shadow: 0 16px 48px rgba(18, 24, 38, .10);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      color-scheme: light;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090b10;
        --card: rgba(17, 20, 29, .82);
        --card-solid: #11141d;
        --soft: rgba(255, 255, 255, .055);
        --line: rgba(255, 255, 255, .085);
        --line-strong: rgba(255, 255, 255, .15);
        --text: #f4f6fb;
        --muted: #a2a9b8;
        --faint: #727b8e;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --shadow: 0 16px 48px rgba(0, 0, 0, .36);
        color-scheme: dark;
      }
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; overflow-y: scroll; }
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    a { color: inherit; text-decoration: none; }
    img { user-select: none; -webkit-user-drag: none; }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: blur(18px);
    }
    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      min-height: 58px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 750;
      font-size: 17px;
    }
    .brand-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--primary);
      flex: 0 0 auto;
    }
    .segmented {
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 12px;
      padding: 4px;
    }
    .segment {
      border: 0;
      border-radius: 9px;
      padding: 7px 14px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
    }
    .segment.active {
      background: var(--card-solid);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(18, 24, 38, .08);
      font-weight: 650;
    }
    .top-actions { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
    }
    .icon-btn:hover { background: var(--soft); color: var(--text); }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 82px 16px 230px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .tool-select, .search {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card-solid);
      color: var(--text);
      outline: none;
    }
    .tool-select { width: 112px; padding: 0 10px; color: var(--muted); }
    .search-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--faint);
      pointer-events: none;
    }
    .search {
      width: 100%;
      padding: 0 14px 0 40px;
    }
    .task-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .task-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card-solid);
      overflow: hidden;
      min-height: 160px;
      display: flex;
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .task-card:hover {
      border-color: var(--line-strong);
      box-shadow: 0 12px 28px rgba(18, 24, 38, .10);
      transform: translateY(-1px);
    }
    .thumb {
      width: 160px;
      min-width: 160px;
      background: var(--soft);
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .badge-row {
      position: absolute;
      top: 7px;
      left: 7px;
      right: 7px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }
    .image-badge {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 5px;
      background: rgba(0, 0, 0, .54);
      color: #fff;
      padding: 2px 6px;
      font: 600 11px/1.35 ui-monospace, SFMono-Regular, Consolas, monospace;
      backdrop-filter: blur(8px);
    }
    .card-body {
      min-width: 0;
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .prompt {
      color: var(--text);
      font-size: 14px;
      line-height: 1.48;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 62px;
    }
    .tags {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
      margin-top: auto;
    }
    .tags::-webkit-scrollbar { display: none; }
    .tag {
      flex: 0 0 auto;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 6px;
      background: var(--soft);
      color: var(--muted);
      padding: 3px 7px;
      font-size: 12px;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }
    .mini-btn {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--faint);
      display: grid;
      place-items: center;
    }
    .mini-btn:hover { background: var(--soft); color: var(--text); }
    .mini-btn.danger:hover { color: var(--danger); background: color-mix(in srgb, var(--danger) 10%, transparent); }
    .thumb.error-state {
      background: color-mix(in srgb, var(--danger) 10%, var(--soft));
      color: var(--danger);
    }
    .error-mark {
      display: grid;
      place-items: center;
      gap: 8px;
      text-align: center;
      padding: 14px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--danger);
    }
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--faint);
      padding: 86px 16px;
    }
    .pager {
      display: flex;
      justify-content: center;
      padding: 18px 0 0;
    }
    .load-more {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 18px;
      background: var(--card-solid);
      color: var(--text);
    }
    .load-more:hover { background: var(--soft); }
    .load-more[hidden] { display: none; }
    .composer-wrap {
      position: fixed;
      left: 50%;
      bottom: calc(24px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 35;
      width: min(896px, 100%);
      padding: 0 14px;
      pointer-events: none;
    }
    .composer {
      pointer-events: auto;
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      padding: 12px;
    }
    .prompt-box {
      position: relative;
    }
    .input-images {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 2px 10px;
      scrollbar-width: none;
    }
    .input-images:empty { display: none; }
    .input-images::-webkit-scrollbar { display: none; }
    .input-thumb {
      position: relative;
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--soft);
    }
    .input-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .input-thumb button {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      border: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, .58);
      color: #fff;
      padding: 0;
    }
    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 168px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--card-solid) 72%, transparent);
      color: var(--text);
      padding: 12px 42px 12px 14px;
      line-height: 1.5;
      outline: none;
    }
    textarea:focus, input:focus, select:focus {
      border-color: color-mix(in srgb, var(--primary) 60%, var(--line));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
    }
    .clear-prompt {
      position: absolute;
      right: 10px;
      top: 10px;
    }
    .composer-bottom {
      margin-top: 10px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }
    .params {
      flex: 1;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .field label {
      display: block;
      margin: 0 0 4px;
      color: var(--faint);
      font-size: 11px;
    }
    .field input, .field select {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--card-solid) 80%, transparent);
      color: var(--text);
      outline: none;
      padding: 0 9px;
      font-size: 13px;
    }
    .field.model { grid-column: span 2; }
    .field.size { grid-column: span 2; }
    .field .custom-size { margin-top: 6px; }
    .composer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }
    .params-toggle { display: none; }
    .primary-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px color-mix(in srgb, var(--primary) 24%, transparent);
    }
    .primary-btn:hover { background: var(--primary-hover); }
    .status {
      min-height: 18px;
      margin: 8px 4px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 12, 18, .48);
      backdrop-filter: blur(10px);
      padding: 18px;
    }
    .modal.open { display: flex; }
    .detail {
      width: min(1040px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-solid);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, .92fr);
      position: relative;
    }
    .detail-image {
      min-height: 520px;
      background: #0d1017;
      display: grid;
      place-items: center;
      position: relative;
      padding: 18px;
    }
    .detail-image img, .detail-image video {
      max-width: 100%;
      max-height: calc(100vh - 110px);
      object-fit: contain;
      border-radius: 10px;
    }
    .detail-side {
      min-width: 0;
      overflow: auto;
      padding: 22px;
    }
    .detail-title {
      margin: 0 0 8px;
      color: var(--faint);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .detail-prompt {
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 16px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .detail-cell {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--soft);
      padding: 9px;
      min-width: 0;
    }
    .detail-cell span {
      display: block;
      color: var(--faint);
      font-size: 11px;
      margin-bottom: 4px;
    }
    .detail-cell strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .settings {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-solid);
      box-shadow: var(--shadow);
      padding: 20px;
      position: relative;
    }
    .settings h2 { margin: 0 42px 16px 0; font-size: 18px; }
    .settings .field { margin-bottom: 12px; }
    .settings .field input { height: 42px; font-size: 14px; }
    .setting-note { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
    }
    .wide-btn {
      height: 40px;
      border: 0;
      border-radius: 11px;
      padding: 0 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 650;
    }
    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .ghost-btn {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      background: var(--card-solid);
      color: var(--text);
    }
    .ghost-btn:hover { background: var(--soft); }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid color-mix(in srgb, var(--primary) 24%, transparent);
      border-top-color: var(--primary);
      border-radius: 999px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 1120px) {
      .task-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .topbar-inner { min-height: 54px; padding: 8px 12px; }
      .brand span { max-width: 45vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .segmented { display: none; }
      .page { padding: 76px 12px 255px; }
      .toolbar { gap: 8px; }
      .tool-select { width: 96px; }
      .task-grid { grid-template-columns: 1fr; gap: 12px; }
      .task-card { min-height: 142px; }
      .thumb { width: 132px; min-width: 132px; }
      .prompt { font-size: 13px; -webkit-line-clamp: 3; min-height: 58px; }
      .composer-wrap { bottom: calc(12px + var(--safe-bottom)); padding: 0 10px; }
      .composer { border-radius: 18px; padding: 10px; }
      .composer-bottom { align-items: stretch; flex-direction: column; gap: 9px; }
      .params { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field.model { grid-column: span 2; }
      .params-toggle { display: grid; }
      .composer:not(.params-open) .params { display: none; }
      .composer-actions { justify-content: stretch; }
      .composer-actions .icon-btn { flex: 0 0 auto; }
      .primary-btn { flex: 1; width: auto; }
      .modal { align-items: stretch; padding: 12px; }
      .detail {
        width: 100%;
        height: calc(100vh - 24px);
        max-height: calc(100vh - 24px);
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }
      .detail-image {
        min-height: 0;
        padding: 0;
        overflow: hidden;
      }
      .detail-image img, .detail-image video {
        position: absolute;
        inset: 12px;
        width: calc(100% - 24px);
        height: calc(100% - 24px);
        max-width: none;
        max-height: none;
      }
      .detail-side {
        max-height: min(42vh, 340px);
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="https://github.com/CookSleep/gpt_image_playground" target="_blank" rel="noopener noreferrer" title="参考项目">
        <span class="brand-mark" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m8 14 2.5-2.5a2 2 0 0 1 2.8 0L18 16"/><path d="M8 8h.01"/></svg>
        </span>
        <span>GPT Image Playground</span>
      </a>
      <nav class="segmented" aria-label="模式">
        <button class="segment active" type="button">画廊</button>
        <button class="segment" type="button" disabled>Agent</button>
      </nav>
      <div class="top-actions">
        <a class="icon-btn" href="/" title="经典页" aria-label="经典页">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <button id="refresh" class="icon-btn" type="button" title="刷新历史" aria-label="刷新历史">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-15.6 6.1"/><path d="M3 12A9 9 0 0 1 18.6 5.9"/><path d="M3 18h5v-5"/><path d="M21 6h-5v5"/></svg>
        </button>
        <button id="storageBtn" class="icon-btn" type="button" title="云存储" aria-label="云存储">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
        </button>
        <button id="settingsBtn" class="icon-btn" type="button" title="设置" aria-label="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.3.4.7.7 1.1.7H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="page" data-drag-select-surface>
    <div class="toolbar">
      <select id="formatFilter" class="tool-select" aria-label="格式筛选">
        <option value="all">全部</option>
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="webp">WebP</option>
      </select>
      <div class="search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" class="search" type="search" placeholder="搜索提示词、模型、尺寸..." autocomplete="off" />
      </div>
    </div>
    <section id="gallery" class="task-grid" aria-live="polite">
      <div class="empty">正在加载历史...</div>
    </section>
    <div class="pager">

  <div id="storagePanelRoot"></div>
  <script src="/components/storage-panel.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const els = {
      apiKey: $("apiKey"), baseUrl: $("baseUrl"), model: $("model"), size: $("size"), customSize: $("customSize"),
      quality: $("quality"), format: $("format"), partialImages: $("partialImages"),
      useStream: $("useStream"), prompt: $("prompt"), generate: $("generate"),
      status: $("status"), gallery: $("gallery"), search: $("search"), formatFilter: $("formatFilter"),
      loadMore: $("loadMore"),
      composer: $("composer"), paramsToggle: $("paramsToggle"),
      inputImages: $("inputImages"), attachImage: $("attachImage"), imageFile: $("imageFile"),
      refresh: $("refresh"), storageBtn: $("storageBtn"), storagePanelRoot: $("storagePanelRoot"),
      settingsBtn: $("settingsBtn"), settingsBtn2: $("settingsBtn2"),
      settingsModal: $("settingsModal"), settingsClose: $("settingsClose"), saveSettingsBtn: $("saveSettingsBtn"),
      detailModal: $("detailModal"), detailClose: $("detailClose"), detailImage: $("detailImage"),
      detailPrompt: $("detailPrompt"), detailMeta: $("detailMeta"), reuseBtn: $("reuseBtn"),
      openImageBtn: $("openImageBtn"), clearPrompt: $("clearPrompt"),
    };
    const SETTINGS_KEY = "imageStudioSettings";
    const MAIN_SETTINGS_KEY = "imageGenSettings";
    const PAGE_SIZE = 24;
    const MAX_INPUT_IMAGES = 10;
    let images = [];
    let referenceImages = [];
    let activeItem = null;
    let lastSubmitAt = 0;
    let nextCursor = null;
    let hasMoreImages = false;
    let loadingImages = false;

    function runningCount() {
      return images.filter(item => item.status === "running").length;
    }

    function updateRunningStatus() {
      const count = runningCount();
      if (count > 0) setStatus(count + " 个任务正在生成...", "");
    }
    function hasLiveTimers() {
      return images.some(item => item.status === "running");
    }
    function liveTimerItemById(id) {
      return images.find(item => String(item.id) === String(id));
    }
    function updateLiveTimers() {
      for (const node of els.gallery.querySelectorAll("[data-timer-id]")) {
        const item = liveTimerItemById(node.getAttribute("data-timer-id"));
        if (!item) continue;
        node.textContent = generationTimeLabel(item);
      }
    }

    function setStatus(text, type) {
      els.status.textContent = text || "";
      els.status.className = "status " + (type || "");
    }
    function selectHasValue(select, value) {
      return Array.from(select.options).some((option) => option.value === value);
    }
    function normalizeSizeValue(value) {
      return String(value || "").trim().toLowerCase().replace(/[×＊*]/g, "x").replace(/\s+/g, "");
    }
    function isValidSizeValue(value) {
      return value === "auto" || /^\d{2,5}x\d{2,5}$/.test(normalizeSizeValue(value));
    }
    function currentSizeValue() {
      if (els.size.value === "custom") return normalizeSizeValue(els.customSize.value);
      return els.size.value || "auto";
    }
    function updateCustomSizeVisibility() {
      const isCustom = els.size.value === "custom";
      els.customSize.hidden = !isCustom;
      if (isCustom && !els.customSize.value) els.customSize.value = "1024x1024";
    }
    function setSizeValue(value) {
      const size = normalizeSizeValue(value || "auto");
      if (selectHasValue(els.size, size) && size !== "custom") {
        els.size.value = size;
      } else if (/^\d{2,5}x\d{2,5}$/.test(size)) {
        els.size.value = "custom";
        els.customSize.value = size;
      } else {
        els.size.value = "auto";
      }
      updateCustomSizeVisibility();
    }
    function saveSettings() {
      const s = Object.fromEntries(["apiKey","baseUrl","model","quality","format","partialImages","prompt"].map(k => [k, els[k].value]));
      s.size = currentSizeValue();
      if (els.size.value === "custom") els.customSize.value = s.size;
      s.useStream = els.useStream.value === "1";
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
      return s;
    }
    function loadSettings() {
      try {
        let s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
        if (!Object.keys(s).length) {
          const main = JSON.parse(localStorage.getItem(MAIN_SETTINGS_KEY) || "{}");
          s = { apiKey: main.apiKey, baseUrl: main.baseUrl, model: main.model, size: main.size, quality: main.quality, format: main.outputFormat, partialImages: main.partialImages, prompt: main.prompt, useStream: false };
        }
        if (s.useStream == null) s.useStream = false;
        for (const [k, v] of Object.entries(s)) {
          if (k === "size") { setSizeValue(v); continue; }
          if (!els[k] || v == null) continue;
          if (k === "useStream") els[k].value = v ? "1" : "0";
          else els[k].value = v;
        }
        if (!s.size) setSizeValue("auto");
      } catch (_) {}
    }
    function mimeFromFormat(format) { return format === "jpeg" ? "image/jpeg" : format === "webp" ? "image/webp" : "image/png"; }
    function formatFromMime(mimeType) {
      const type = (mimeType || "").toLowerCase();
      if (type === "image/jpeg" || type === "image/jpg") return "jpeg";
      if (type === "image/webp") return "webp";
      if (type === "image/png") return "png";
      return "";
    }
    function mimeFromDataUrl(dataUrl) {
      const match = /^data:([^;,]+)[;,]/i.exec(dataUrl || "");
      return match ? match[1].toLowerCase() : "";
    }
    function mimeFromBase64(value) {
      const clean = stripDataUrl(value);
      try {
        const raw = atob(clean.slice(0, 24));
        const bytes = Array.from(raw.slice(0, 12)).map((c) => c.charCodeAt(0));
        if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4e && bytes[3] === 0x47) return "image/png";
        if (bytes[0] === 0xff && bytes[1] === 0xd8 && bytes[2] === 0xff) return "image/jpeg";
        if (bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[3] === 0x46 && bytes[8] === 0x57 && bytes[9] === 0x45 && bytes[10] === 0x42 && bytes[11] === 0x50) return "image/webp";
      } catch (_) {}
      return "";
    }
    function formatBytes(n) { n = Number(n) || 0; return n < 1024 ? n + " B" : n < 1048576 ? (n / 1024).toFixed(0) + " KB" : (n / 1048576).toFixed(2) + " MB"; }
    function formatDims(w, h) { return w && h ? w + "×" + h : "未知"; }
    function timestampMs(value) {
      if (!value) return 0;
      if (typeof value === "number") return value;
      const ms = Date.parse(value);
      return Number.isFinite(ms) ? ms : 0;
    }
    function formatDuration(ms) {
      ms = Math.max(0, Number(ms) || 0);
      const total = Math.floor(ms / 1000);
      const minutes = Math.floor(total / 60);
      const seconds = total % 60;
      if (minutes >= 60) {
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        return hours + "时" + String(rest).padStart(2, "0") + "分";
      }
      if (minutes > 0) return minutes + "分" + String(seconds).padStart(2, "0") + "秒";
      return seconds + "秒";
    }
    function formatClock(value) {
      const ms = timestampMs(value);
      if (!ms) return "";
      const d = new Date(ms);
      return String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0") + " " + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
    }
    function elapsedMs(item) {
      return Math.max(0, Date.now() - timestampMs(item.started_at || item.created_at || item.createdAt));
    }
    function generationTimeLabel(item) {
      if (item.status === "running") return "已用 " + formatDuration(elapsedMs(item));
      const duration = Number(item.generation_ms || item.duration_ms || item.elapsed_ms || 0);
      if (duration > 0) return "耗时 " + formatDuration(duration);
      const completedAt = item.completed_at || item.created_at;
      return completedAt ? "完成 " + formatClock(completedAt) : "";
    }
    function imageStatusText(item) {
      if (item.status === "running") return item.is_partial ? "生成中（已有中间图）" : "生成中";
      if (item.status === "error") return "失败";
      return "已完成";
    }
    function compactValue(value) {
      return value == null || value === "" ? "无" : String(value);
    }
    function escapeHtml(v) { const d = document.createElement("div"); d.textContent = v == null ? "" : String(v); return d.innerHTML; }
    function cssEscape(v) {
      if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(v));
      return String(v).replace(/["\\]/g, "\\$&");
    }
    function stripDataUrl(v) { return String(v || "").replace(/^data:[^,]+,/, "").replace(/\s/g, ""); }
    function base64Bytes(v) {
      const s = stripDataUrl(v);
      const pad = s.endsWith("==") ? 2 : s.endsWith("=") ? 1 : 0;
      return Math.max(0, Math.floor(s.length * 3 / 4) - pad);
    }
    function base64ToBlob(value, mimeType) {
      const clean = stripDataUrl(value);
      const binary = atob(clean);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mimeType || "application/octet-stream" });
    }
    function qiniuImageExt(mimeType) {
      const format = formatFromMime(mimeType);
      return format === "jpeg" ? "jpg" : format || "png";
    }
    async function uploadGeneratedImageToQiniu(entry, mimeType) {
      const id = crypto.randomUUID ? crypto.randomUUID() : "img-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
      const key = "images/" + id + "." + qiniuImageExt(mimeType);
      const file = base64ToBlob(entry.imageData, mimeType);
      const tokenRes = await fetch("/api/storage/qiniu/upload-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: key.split("/").pop(), mimeType, size: file.size, key }),
      });
      const tokenJson = await tokenRes.json().catch(() => ({}));
      if (!tokenRes.ok) throw new Error(tokenJson.error?.message || "七牛上传凭证获取失败");
      const tokenData = tokenJson.data || {};
      const form = new FormData();
      form.append("token", tokenData.token);
      form.append("key", tokenData.key);
      form.append("file", file, key.split("/").pop());
      const uploadRes = await fetch(tokenData.uploadUrl, { method: "POST", body: form });
      const uploadJson = await uploadRes.json().catch(() => ({}));
      if (!uploadRes.ok) throw new Error(uploadJson.error || uploadJson.message || "七牛原图上传失败");
      return { id, key: tokenData.key, url: tokenData.publicUrl, bytes: file.size };
    }
    function srcFromImage(img, mime) { return img.imageData?.startsWith("data:") ? img.imageData : "data:" + mime + ";base64," + img.imageData; }
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("图像加载失败"));
        img.src = src;
      });
    }
    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ""));
        r.onerror = () => reject(r.error);
        r.readAsDataURL(blob);
      });
    }
    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ""));
        r.onerror = () => reject(r.error);
        r.readAsDataURL(file);
      });
    }
    function renderInputImages() {
      els.inputImages.innerHTML = referenceImages.map((item) => `
        <div class="input-thumb" title="${escapeHtml(item.name)}">
          <img src="${escapeHtml(item.dataUrl || item.url)}" alt="">
          <button type="button" data-remove-image="${escapeHtml(item.id)}" aria-label="移除参考图">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      `).join("");
      for (const btn of els.inputImages.querySelectorAll("[data-remove-image]")) {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-remove-image");
          referenceImages = referenceImages.filter(item => item.id !== id);
          renderInputImages();
        });
      }
    }
    async function addInputFiles(files) {
      const accepted = Array.from(files || []).filter(file => file.type.startsWith("image/"));
      if (!accepted.length) return;
      const remaining = MAX_INPUT_IMAGES - referenceImages.length;
      if (remaining <= 0) {
        setStatus("参考图已达上限 " + MAX_INPUT_IMAGES + " 张", "error");
        return;
      }
      for (const file of accepted.slice(0, remaining)) {
        referenceImages.push({
          id: "input-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8),
          name: file.name || "image",
          dataUrl: await fileToDataUrl(file),
        });
      }
      if (accepted.length > remaining) setStatus("参考图最多 " + MAX_INPUT_IMAGES + " 张，已忽略多余图片", "error");
      else setStatus(referenceImages.length + " 张参考图已添加，生成时将使用编辑模式", "ok");
      renderInputImages();
    }
    function storageFileIsImage(file) {
      const type = String(file?.mimeType || file?.mime_type || "");
      const key = String(file?.key || file?.url || "");
      return type.startsWith("image/") || /\.(png|jpe?g|webp|gif|avif)$/i.test(key);
    }
    function addCloudReference(file) {
      const url = file?.url || file?.publicUrl || "";
      if (!url) return false;
      if (referenceImages.length >= MAX_INPUT_IMAGES) {
        setStatus("参考图已达上限 " + MAX_INPUT_IMAGES + " 张", "error");
        return false;
      }
      referenceImages.push({
        id: "cloud-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8),
        name: file.key || file.name || "cloud image",
        url,
      });
      renderInputImages();
      setStatus("已添加云存储图片作为参考图", "ok");
      return true;
    }
    async function hydrateUrlImage(entry) {
      if (!entry.url || entry.imageData) return;
      const res = await fetch(entry.url);
      if (!res.ok) throw new Error("接口返回的图片 URL 下载失败");
      const blob = await res.blob();
      entry.mimeType = blob.type || res.headers.get("Content-Type") || entry.mimeType;
      entry.format = formatFromMime(entry.mimeType) || entry.format;
      entry.imageData = await blobToDataUrl(blob);
    }
    async function saveImage(entry) {
      await hydrateUrlImage(entry);
      const image = await loadImage(srcFromImage(entry, entry.mimeType));
      const originalBytes = base64Bytes(entry.imageData);
      const mime = entry.mimeType || mimeFromDataUrl(entry.imageData) || "image/png";
      const stored = await uploadGeneratedImageToQiniu(entry, mime);
      const thumbnail = { mime_type: mime, bytes: stored.bytes || originalBytes, width: image.naturalWidth, height: image.naturalHeight, original_bytes: stored.bytes || originalBytes, original_width: image.naturalWidth, original_height: image.naturalHeight, compression_ratio: 1, quality: 1 };
      const res = await fetch("/api/images", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: stored.id, prompt: entry.prompt, model: entry.model, api_mode: "responses", size: entry.size, quality: entry.quality, format: entry.format, streamed: entry.streamed ? 1 : 0, reference_count: entry.reference_count || 0, storage_provider: "qiniu", storage_key: stored.key, thumbnail_url: stored.url, thumbnail, status: "completed", completed_at: entry.completed_at, generation_ms: entry.generation_ms || 0 }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(json.error?.message || "服务端历史写入失败");
      return json.data;
    }
    async function saveFailedImage(entry) {
      const startedAt = entry.started_at || new Date().toISOString();
      const completedAt = entry.completed_at || new Date().toISOString();
      const startedMs = timestampMs(startedAt) || Date.now();
      const generationMs = Number(entry.generation_ms || 0) || Math.max(0, Date.now() - startedMs);
      const res = await fetch("/api/images", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt: entry.prompt,
          model: entry.model,
          api_mode: "responses",
          size: entry.size,
          quality: entry.quality,
          format: entry.format,
          streamed: entry.streamed ? 1 : 0,
          reference_count: entry.reference_count || 0,
          status: "error",
          error: entry.error || "Generation failed",
          started_at: startedAt,
          completed_at: completedAt,
          generation_ms: generationMs,
        }),

    els.customSize.addEventListener("input", saveSettings);
    els.customSize.addEventListener("change", saveSettings);
    for (const id of ["apiKey","baseUrl","model","quality","format","partialImages","prompt","useStream"]) {
      els[id].addEventListener("change", saveSettings);
      if (id === "prompt") els[id].addEventListener("input", saveSettings);
    }
    loadSettings();
    loadGallery().catch(err => setStatus(err.message || String(err), "error"));
    setInterval(() => {
      if (hasLiveTimers()) updateLiveTimers();
    }, 1000);
  </script>
</body>
</html>
