<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agnes Image Playground</title>
  <link rel="stylesheet" href="/components/storage-panel.css" />
  <style>
    :root {
      --bg: #f7f8fb;
      --card: rgba(255, 255, 255, .86);
      --card-solid: #ffffff;
      --soft: #f1f3f7;
      --line: #e4e7ee;
      --line-strong: #d7dce6;
      --text: #161922;
      --muted: #687083;
      --faint: #98a1b3;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --ok: #16a34a;
      --shadow: 0 16px 48px rgba(18, 24, 38, .10);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      color-scheme: light;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090b10;
        --card: rgba(17, 20, 29, .82);
        --card-solid: #11141d;
        --soft: rgba(255, 255, 255, .055);
        --line: rgba(255, 255, 255, .085);
        --line-strong: rgba(255, 255, 255, .15);
        --text: #f4f6fb;
        --muted: #a2a9b8;
        --faint: #727b8e;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --shadow: 0 16px 48px rgba(0, 0, 0, .36);
        color-scheme: dark;
      }
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; overflow-y: scroll; }
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    a { color: inherit; text-decoration: none; }
    img { user-select: none; -webkit-user-drag: none; }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: blur(18px);
    }
    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      min-height: 58px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 750;
      font-size: 17px;
    }
    .brand-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--primary);
      flex: 0 0 auto;
    }
    .segmented {
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 12px;
      padding: 4px;
    }
    .segment {
      border: 0;
      border-radius: 9px;
      padding: 7px 14px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
    }
    .segment.active {
      background: var(--card-solid);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(18, 24, 38, .08);
      font-weight: 650;
    }
    .top-actions { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
    }
    .icon-btn:hover { background: var(--soft); color: var(--text); }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 82px 16px 230px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .tool-select, .search {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card-solid);
      color: var(--text);
      outline: none;
    }
    .tool-select { width: 112px; padding: 0 10px; color: var(--muted); }
    .search-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--faint);
      pointer-events: none;
    }
    .search {
      width: 100%;
      padding: 0 14px 0 40px;
    }
    .task-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .task-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card-solid);
      overflow: hidden;
      min-height: 160px;
      display: flex;
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .task-card:hover {
      border-color: var(--line-strong);
      box-shadow: 0 12px 28px rgba(18, 24, 38, .10);
      transform: translateY(-1px);
    }
    .thumb {
      width: 160px;
      min-width: 160px;
      background: var(--soft);
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #05070b;
    }
    .badge-row {
      position: absolute;
      top: 7px;
      left: 7px;
      right: 7px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }
    .image-badge {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 5px;
      background: rgba(0, 0, 0, .54);
      color: #fff;
      padding: 2px 6px;
      font: 600 11px/1.35 ui-monospace, SFMono-Regular, Consolas, monospace;
      backdrop-filter: blur(8px);
    }
    .card-body {
      min-width: 0;
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .prompt {
      color: var(--text);
      font-size: 14px;
      line-height: 1.48;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 62px;
    }
    .tags {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
      margin-top: auto;
    }
    .tags::-webkit-scrollbar { display: none; }
    .tag {
      flex: 0 0 auto;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 6px;
      background: var(--soft);
      color: var(--muted);
      padding: 3px 7px;
      font-size: 12px;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }
    .mini-btn {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--faint);
      display: grid;
      place-items: center;
    }
    .mini-btn:hover { background: var(--soft); color: var(--text); }
    .mini-btn.danger:hover { color: var(--danger); background: color-mix(in srgb, var(--danger) 10%, transparent); }
    .thumb.error-state {
      background: color-mix(in srgb, var(--danger) 10%, var(--soft));
      color: var(--danger);
    }
    .error-mark {
      display: grid;
      place-items: center;
      gap: 8px;
      text-align: center;
      padding: 14px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--danger);
    }
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--faint);
      padding: 86px 16px;
    }
    .pager {
      display: flex;
      justify-content: center;
      padding: 18px 0 0;
    }
    .load-more {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 18px;
      background: var(--card-solid);
      color: var(--text);
    }
    .load-more:hover { background: var(--soft); }
    .load-more[hidden] { display: none; }
    .composer-wrap {
      position: fixed;
      left: 50%;
      bottom: calc(24px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 35;
      width: min(896px, 100%);
      padding: 0 14px;
      pointer-events: none;
    }
    .composer {
      pointer-events: auto;
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      padding: 12px;
    }
    .prompt-box {
      position: relative;
    }
    .input-images {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 2px 10px;
      scrollbar-width: none;
    }
    .input-images:empty { display: none; }
    .input-images::-webkit-scrollbar { display: none; }
    .input-thumb {
      position: relative;
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--soft);
    }
    .input-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .input-thumb button {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      border: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, .58);
      color: #fff;
      padding: 0;
    }
    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 168px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--card-solid) 72%, transparent);
      color: var(--text);
      padding: 12px 42px 12px 14px;
      line-height: 1.5;
      outline: none;
    }
    textarea:focus, input:focus, select:focus {
      border-color: color-mix(in srgb, var(--primary) 60%, var(--line));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
    }
    .clear-prompt {
      position: absolute;
      right: 10px;
      top: 10px;
    }
    .composer-bottom {
      margin-top: 10px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }
    .params {
      flex: 1;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .field label {
      display: block;
      margin: 0 0 4px;
      color: var(--faint);
      font-size: 11px;
    }
    .field input, .field select {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--card-solid) 80%, transparent);
      color: var(--text);
      outline: none;
      padding: 0 9px;
      font-size: 13px;
    }
    .field.model { grid-column: span 2; }
    .field.size { grid-column: span 2; }
    .field.video-url { grid-column: span 2; }
    .field.check { align-self: end; }
    .check-label {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 13px;
      white-space: nowrap;
    }
    .field.check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      padding: 0;
      accent-color: var(--primary);
    }
    .field .custom-size { margin-top: 6px; }
    .composer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }
    .params-toggle { display: none; }
    .primary-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px color-mix(in srgb, var(--primary) 24%, transparent);
    }
    .primary-btn:hover { background: var(--primary-hover); }
    .status {
      min-height: 18px;
      margin: 8px 4px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 12, 18, .48);
      backdrop-filter: blur(10px);
      padding: 18px;
    }
    .modal.open { display: flex; }
    .detail {
      width: min(1040px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-solid);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, .92fr);
      position: relative;
    }
    .detail-image {
      min-height: 520px;
      background: #0d1017;
      display: grid;
      place-items: center;
      position: relative;
      padding: 18px;
    }
    .detail-image img, .detail-image video {
      max-width: 100%;
      max-height: calc(100vh - 110px);
      object-fit: contain;
      border-radius: 10px;
    }
    .detail-side {
      min-width: 0;
      overflow: auto;
      padding: 22px;
    }
    .detail-title {
      margin: 0 0 8px;
      color: var(--faint);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .detail-prompt {
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 16px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .detail-cell {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--soft);
      padding: 9px;
      min-width: 0;
    }
    .detail-cell span {
      display: block;
      color: var(--faint);
      font-size: 11px;
      margin-bottom: 4px;
    }
    .detail-cell strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .settings {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-solid);
      box-shadow: var(--shadow);
      padding: 20px;
      position: relative;
    }
    .settings h2 { margin: 0 42px 16px 0; font-size: 18px; }
    .settings .field { margin-bottom: 12px; }
    .settings .field input { height: 42px; font-size: 14px; }
    .setting-note { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
    }
    .wide-btn {
      height: 40px;
      border: 0;
      border-radius: 11px;
      padding: 0 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 650;
    }
    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .ghost-btn {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      background: var(--card-solid);
      color: var(--text);
    }
    .ghost-btn:hover { background: var(--soft); }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid color-mix(in srgb, var(--primary) 24%, transparent);
      border-top-color: var(--primary);
      border-radius: 999px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 1120px) {
      .task-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .topbar-inner { min-height: 54px; padding: 8px 12px; }
      .brand span { max-width: 45vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .segmented { display: none; }
      .page { padding: 76px 12px 255px; }
      .toolbar { gap: 8px; }
      .tool-select { width: 96px; }
      .task-grid { grid-template-columns: 1fr; gap: 12px; }
      .task-card { min-height: 142px; }
      .thumb { width: 132px; min-width: 132px; }
      .prompt { font-size: 13px; -webkit-line-clamp: 3; min-height: 58px; }
      .composer-wrap { bottom: calc(12px + var(--safe-bottom)); padding: 0 10px; }
      .composer { border-radius: 18px; padding: 10px; }
      .composer-bottom { align-items: stretch; flex-direction: column; gap: 9px; }
      .params { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field.model { grid-column: span 2; }
      .params-toggle { display: grid; }
      .composer:not(.params-open) .params { display: none; }
      .composer-actions { justify-content: stretch; }
      .composer-actions .icon-btn { flex: 0 0 auto; }
      .primary-btn { flex: 1; width: auto; }
      .modal { align-items: stretch; padding: 12px; }
      .detail {
        width: 100%;
        height: calc(100vh - 24px);
        max-height: calc(100vh - 24px);
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }
      .detail-image {
        min-height: 0;
        padding: 0;
        overflow: hidden;
      }
      .detail-image img, .detail-image video {
        position: absolute;
        inset: 12px;
        width: calc(100% - 24px);
        height: calc(100% - 24px);
        max-width: none;
        max-height: none;
      }
      .detail-side {
        max-height: min(42vh, 340px);
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="https://github.com/CookSleep/gpt_image_playground" target="_blank" rel="noopener noreferrer" title="参考项目">
        <span class="brand-mark" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m8 14 2.5-2.5a2 2 0 0 1 2.8 0L18 16"/><path d="M8 8h.01"/></svg>
        </span>
        <span>Agnes Image Playground</span>
      </a>
      <nav class="segmented" aria-label="模式">
        <button id="imageModeBtn" class="segment active" type="button">画廊</button>
        <button id="videoModeBtn" class="segment" type="button">视频</button>
      </nav>
      <div class="top-actions">
        <a class="icon-btn" href="/" title="经典页" aria-label="经典页">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <button id="refresh" class="icon-btn" type="button" title="刷新历史" aria-label="刷新历史">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-15.6 6.1"/><path d="M3 12A9 9 0 0 1 18.6 5.9"/><path d="M3 18h5v-5"/><path d="M21 6h-5v5"/></svg>
        </button>
        <button id="storageBtn" class="icon-btn" type="button" title="云存储" aria-label="云存储">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
        </button>
        <button id="settingsBtn" class="icon-btn" type="button" title="设置" aria-label="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.3.4.7.7 1.1.7H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="page" data-drag-select-surface>
    <div class="toolbar">
      <select id="formatFilter" class="tool-select" aria-label="格式筛选">
        <option value="all">全部</option>
        <option value="png">PNG</option>

  <div id="storagePanelRoot"></div>
  <script src="/components/storage-panel.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const els = {
      apiKey: $("apiKey"), baseUrl: $("baseUrl"), model: $("model"), size: $("size"), customSize: $("customSize"), outputUrl: $("outputUrl"),
      videoFrames: $("videoFrames"), videoRate: $("videoRate"), videoImageUrls: $("videoImageUrls"),
      prompt: $("prompt"), generate: $("generate"),
      status: $("status"), gallery: $("gallery"), search: $("search"), formatFilter: $("formatFilter"),
      loadMore: $("loadMore"),
      composer: $("composer"), paramsToggle: $("paramsToggle"),
      inputImages: $("inputImages"), attachImage: $("attachImage"), imageFile: $("imageFile"),
      refresh: $("refresh"), storageBtn: $("storageBtn"), storagePanelRoot: $("storagePanelRoot"),
      settingsBtn: $("settingsBtn"), settingsBtn2: $("settingsBtn2"),
      settingsModal: $("settingsModal"), settingsClose: $("settingsClose"), saveSettingsBtn: $("saveSettingsBtn"),
      detailModal: $("detailModal"), detailClose: $("detailClose"), detailImage: $("detailImage"),
      detailPrompt: $("detailPrompt"), detailMeta: $("detailMeta"), reuseBtn: $("reuseBtn"),
      openImageBtn: $("openImageBtn"), clearPrompt: $("clearPrompt"),
      imageModeBtn: $("imageModeBtn"), videoModeBtn: $("videoModeBtn"),
    };
    const SETTINGS_KEY = "agnesImageSettings";
    const VIDEO_SETTINGS_KEY = "agnesVideoSettings";
    const VIDEO_JOBS_KEY = "agnesVideoJobs";
    const MODEL_OPTIONS = {
      image: [
        ["agnes-image-2.1-flash", "Agnes Image 2.1 Flash"],
        ["agnes-image-2.0-flash", "Agnes Image 2.0 Flash"],
      ],
      video: [
        ["agnes-video-v2.0", "Agnes Video V2.0"],
      ],
    };
    const CUSTOM_SIZE_VALUE = "custom";
    const PAGE_SIZE = 24;
    const MAX_INPUT_IMAGES = 10;
    const VIDEO_QUERY_INTERVAL_MS = 60 * 1000;
    const VIDEO_RATE_LIMIT_BACKOFF_MS = 3 * 60 * 1000;
    let images = [];
    let videoJobs = [];
    let referenceImages = [];
    let activeItem = null;
    let activeMode = "image";
    let lastSubmitAt = 0;
    let nextCursor = null;
    let hasMoreImages = false;
    let loadingImages = false;
    const videoPollTimers = new Map();

    function runningCount() {
      return images.filter(item => item.status === "running").length;
    }

    function updateRunningStatus() {
      const count = runningCount();
      if (count > 0) setStatus(count + " 个任务正在生成...", "");
    }
    function hasLiveTimers() {
      return activeMode === "video"
        ? videoJobs.some(item => !videoIsDone(item))
        : images.some(item => item.status === "running");
    }
    function liveTimerItemById(id) {
      const list = activeMode === "video" ? videoJobs : images;
      return list.find(item => String(item.id) === String(id));
    }
    function updateLiveTimers() {
      for (const node of els.gallery.querySelectorAll("[data-timer-id]")) {
        const item = liveTimerItemById(node.getAttribute("data-timer-id"));
        if (!item) continue;
        node.textContent = generationTimeLabel(item);
      }
    }

    function setStatus(text, type) {
      els.status.textContent = text || "";
      els.status.className = "status " + (type || "");
    }
    function selectHasValue(select, value) {
      return Array.from(select.options).some((option) => option.value === value);
    }
    function defaultModelValue() {
      return MODEL_OPTIONS[activeMode][0][0];
    }
    function updateModelOptions() {
      const current = els.model.value;
      els.model.innerHTML = MODEL_OPTIONS[activeMode]
        .map(([value, label]) => `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`)
        .join("");
      els.model.value = selectHasValue(els.model, current) ? current : defaultModelValue();
    }
    function setModelValue(value) {
      els.model.value = selectHasValue(els.model, value) ? value : defaultModelValue();
    }
    function normalizeSizeValue(value) {
      return String(value || "").trim().toLowerCase().replace(/[×＊*]/g, "x").replace(/\s+/g, "");
    }
    function isValidSizeValue(value) {
      return /^\d{2,5}x\d{2,5}$/.test(normalizeSizeValue(value));
    }
    function currentSizeValue() {
      if (els.size.value === CUSTOM_SIZE_VALUE) return normalizeSizeValue(els.customSize.value);
      return els.size.value || "1024x768";
    }
    function updateCustomSizeVisibility() {
      const isCustom = els.size.value === CUSTOM_SIZE_VALUE;
      els.customSize.hidden = !isCustom;
      if (isCustom && !els.customSize.value) els.customSize.value = "1024x768";
    }
    function setSizeValue(value) {
      let size = normalizeSizeValue(value || "1024x768");
      if (size === "auto") size = "1024x768";
      if (selectHasValue(els.size, size) && size !== CUSTOM_SIZE_VALUE) {
        els.size.value = size;
      } else if (isValidSizeValue(size)) {
        els.size.value = CUSTOM_SIZE_VALUE;
        els.customSize.value = size;
      } else {
        els.size.value = "1024x768";
      }
      updateCustomSizeVisibility();
    }
    function saveSettings() {
      const settingKey = activeMode === "video" ? VIDEO_SETTINGS_KEY : SETTINGS_KEY;
      const fields = activeMode === "video"
        ? ["apiKey","baseUrl","model","prompt","videoFrames","videoRate","videoImageUrls"]
        : ["apiKey","baseUrl","model","prompt"];
      const s = Object.fromEntries(fields.map(k => [k, els[k].value]));
      s.size = currentSizeValue();
      if (activeMode === "image") s.responseFormat = els.outputUrl.checked ? "url" : "b64_json";
      if (els.size.value === CUSTOM_SIZE_VALUE) els.customSize.value = s.size;
      localStorage.setItem(settingKey, JSON.stringify(s));
      return s;
    }
    function loadSettings() {
      try {
        updateModelOptions();
        const imageSettings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
        let s = JSON.parse(localStorage.getItem(activeMode === "video" ? VIDEO_SETTINGS_KEY : SETTINGS_KEY) || "{}");
        if (!Object.keys(s).length) {
          s = activeMode === "video"
            ? { apiKey: imageSettings.apiKey || "", baseUrl: imageSettings.baseUrl || "https://apihub.agnes-ai.com", model: "agnes-video-v2.0", size: "1152x768", videoFrames: "121", videoRate: "24" }
            : { baseUrl: "https://apihub.agnes-ai.com", model: "agnes-image-2.1-flash", size: "1024x768" };
        }        for (const [k, v] of Object.entries(s)) {
          if (k === "size") { setSizeValue(v); continue; }
          if (k === "model") { setModelValue(v); continue; }
          if (k === "responseFormat" && els.outputUrl) { els.outputUrl.checked = v === "url"; continue; }
          if (!els[k] || v == null) continue;
          els[k].value = v;
        }
        if (activeMode === "video" && els.outputUrl) els.outputUrl.checked = false;
        if (!s.size) setSizeValue(activeMode === "video" ? "1152x768" : "1024x768");
      } catch (_) {}
    }
    function formatFromMime(mimeType) {
      const type = (mimeType || "").toLowerCase();
      if (type === "image/jpeg" || type === "image/jpg") return "jpeg";
      if (type === "image/webp") return "webp";
      if (type === "image/png") return "png";
      return "";
    }
    function mimeFromDataUrl(dataUrl) {
      const match = /^data:([^;,]+)[;,]/i.exec(dataUrl || "");
      return match ? match[1].toLowerCase() : "";
    }
    function mimeFromBase64(value) {
      const clean = stripDataUrl(value);
      try {
        const raw = atob(clean.slice(0, 24));
        const bytes = Array.from(raw.slice(0, 12)).map((c) => c.charCodeAt(0));
        if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4e && bytes[3] === 0x47) return "image/png";
        if (bytes[0] === 0xff && bytes[1] === 0xd8 && bytes[2] === 0xff) return "image/jpeg";
        if (bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[3] === 0x46 && bytes[8] === 0x57 && bytes[9] === 0x45 && bytes[10] === 0x42 && bytes[11] === 0x50) return "image/webp";
      } catch (_) {}
      return "";
    }
    function formatBytes(n) { n = Number(n) || 0; return n < 1024 ? n + " B" : n < 1048576 ? (n / 1024).toFixed(0) + " KB" : (n / 1048576).toFixed(2) + " MB"; }
    function formatDims(w, h) { return w && h ? w + "×" + h : "未知"; }
    function timestampMs(value) {
      if (!value) return 0;
      if (typeof value === "number") return value;
      const ms = Date.parse(value);
      return Number.isFinite(ms) ? ms : 0;
    }
    function formatDuration(ms) {
      ms = Math.max(0, Number(ms) || 0);
      const total = Math.floor(ms / 1000);
      const minutes = Math.floor(total / 60);
      const seconds = total % 60;
      if (minutes >= 60) {
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        return hours + "时" + String(rest).padStart(2, "0") + "分";
      }
      if (minutes > 0) return minutes + "分" + String(seconds).padStart(2, "0") + "秒";
      return seconds + "秒";
    }
    function formatClock(value) {
      const ms = timestampMs(value);
      if (!ms) return "";
      const d = new Date(ms);
      return String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0") + " " + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
    }
    function elapsedMs(item) {
      return Math.max(0, Date.now() - timestampMs(item.started_at || item.created_at || item.createdAt));
    }
    function generationTimeLabel(item) {
      if (item.status === "running" || item.status === "creating" || (!videoIsDone(item) && item.kind === "video")) {
        return "已用 " + formatDuration(elapsedMs(item));
      }
      const duration = Number(item.generation_ms || item.duration_ms || item.elapsed_ms || 0);
      if (duration > 0) return "耗时 " + formatDuration(duration);
      const completedAt = item.completed_at || item.created_at;
      return completedAt ? "完成 " + formatClock(completedAt) : "";
    }
    function escapeHtml(v) { const d = document.createElement("div"); d.textContent = v == null ? "" : String(v); return d.innerHTML; }
    function cssEscape(v) {
      if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(v));
      return String(v).replace(/["\\]/g, "\\$&");
    }
    function stripDataUrl(v) { return String(v || "").replace(/^data:[^,]+,/, "").replace(/\s/g, ""); }
    function base64Bytes(v) {
      const s = stripDataUrl(v);
      const pad = s.endsWith("==") ? 2 : s.endsWith("=") ? 1 : 0;
      return Math.max(0, Math.floor(s.length * 3 / 4) - pad);
    }
    function base64ToBlob(value, mimeType) {
      const clean = stripDataUrl(value);
      const binary = atob(clean);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mimeType || "application/octet-stream" });
    }
    function qiniuImageExt(mimeType) {
      const format = formatFromMime(mimeType);
      return format === "jpeg" ? "jpg" : format || "png";
    }
    function srcFromImage(img, mime) { return img.imageData?.startsWith("data:") ? img.imageData : "data:" + mime + ";base64," + img.imageData; }
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("图像加载失败"));
        img.src = src;
      });
    }
    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ""));
        r.onerror = () => reject(r.error);
        r.readAsDataURL(blob);
      });
    }
    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ""));
        r.onerror = () => reject(r.error);
        r.readAsDataURL(file);
      });
    }
    function renderInputImages() {
      els.inputImages.innerHTML = referenceImages.map((item) => `
        <div class="input-thumb" title="${escapeHtml(item.name)}">
          <img src="${escapeHtml(item.dataUrl)}" alt="">
          <button type="button" data-remove-image="${escapeHtml(item.id)}" aria-label="移除参考图">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      `).join("");
      for (const btn of els.inputImages.querySelectorAll("[data-remove-image]")) {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-remove-image");
          referenceImages = referenceImages.filter(item => item.id !== id);
          renderInputImages();
        });
      }
    }
    async function addInputFiles(files) {
      const accepted = Array.from(files || []).filter(file => file.type.startsWith("image/"));
      if (!accepted.length) return;
      const remaining = MAX_INPUT_IMAGES - referenceImages.length;
      if (remaining <= 0) {
        setStatus("参考图已达上限 " + MAX_INPUT_IMAGES + " 张", "error");
        return;
      }
      for (const file of accepted.slice(0, remaining)) {
        referenceImages.push({
          id: "input-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8),
          name: file.name || "image",
          dataUrl: await fileToDataUrl(file),
        });
      }
      if (accepted.length > remaining) setStatus("参考图最多 " + MAX_INPUT_IMAGES + " 张，已忽略多余图片", "error");
      else setStatus(activeMode === "video" ? referenceImages.length + " 张参考图已添加，创建视频前会先转成 URL" : referenceImages.length + " 张参考图已添加，生成时将使用编辑模式", "ok");
      renderInputImages();
    }
    async function hydrateUrlImage(entry) {
      if (!entry.url || entry.imageData) return;
      const res = await fetch(entry.url);
      if (!res.ok) throw new Error("接口返回的图片 URL 下载失败");
      const blob = await res.blob();
      entry.mimeType = blob.type || res.headers.get("Content-Type") || entry.mimeType;
      entry.format = formatFromMime(entry.mimeType) || entry.format;
      entry.imageData = await blobToDataUrl(blob);
    }
    async function saveImage(entry) {
      await hydrateUrlImage(entry);
      const image = await loadImage(srcFromImage(entry, entry.mimeType));
      const originalBytes = base64Bytes(entry.imageData);
      const mime = entry.mimeType || mimeFromDataUrl(entry.imageData) || "image/png";
      const id = crypto.randomUUID ? crypto.randomUUID() : "img-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
      const key = "images/" + id + "." + qiniuImageExt(mime);
      const file = base64ToBlob(entry.imageData, mime);
      const tokenRes = await fetch("/api/storage/qiniu/upload-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: key.split("/").pop(), mimeType: mime, size: file.size, key }),
      });
      const tokenJson = await tokenRes.json().catch(() => ({}));
      if (!tokenRes.ok) throw new Error(tokenJson.error?.message || "七牛上传凭证获取失败");
      const tokenData = tokenJson.data || {};
      const form = new FormData();
      form.append("token", tokenData.token);
      form.append("key", tokenData.key);
      form.append("file", file, key.split("/").pop());
      const uploadRes = await fetch(tokenData.uploadUrl, { method: "POST", body: form });
      const uploadJson = await uploadRes.json().catch(() => ({}));
      if (!uploadRes.ok) throw new Error(uploadJson.error || uploadJson.message || "七牛原图上传失败");

    }
    function setMode(mode, options = {}) {
      if (mode === activeMode && !options.force) return;
      if (!options.skipSave) saveSettings();
      activeMode = mode;
      els.imageModeBtn.classList.toggle("active", mode === "image");
      els.videoModeBtn.classList.toggle("active", mode === "video");
      for (const node of document.querySelectorAll(".video-param")) node.hidden = mode !== "video";
      for (const node of document.querySelectorAll(".image-param")) node.hidden = mode !== "image";
      els.inputImages.hidden = false;
      els.attachImage.hidden = false;
      els.formatFilter.innerHTML = mode === "video"
        ? `<option value="all">全部</option><option value="running">生成中</option><option value="completed">已完成</option><option value="error">失败</option>`
        : `<option value="all">全部</option><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option>`;
      els.search.placeholder = mode === "video" ? "搜索提示词、模型、video_id..." : "搜索提示词、模型、尺寸...";
      els.prompt.placeholder = mode === "video" ? "描述要生成的视频..." : "描述要生成的图像...";
      updateModelOptions();
      loadSettings();
      if (mode === "video") {
        loadVideoJobs();
        for (const job of videoJobs) if (!videoIsDone(job)) startVideoPolling(job.id, 12);
        renderGallery();
      } else {
        for (const timer of videoPollTimers.values()) clearInterval(timer);
        videoPollTimers.clear();
        loadGallery().catch(err => setStatus(err.message || String(err), "error"));
      }
    }
    function videoQueryWaitMs(job) {
      const nextPollAt = Date.parse(job.next_poll_at || "");
      if (Number.isFinite(nextPollAt) && nextPollAt > Date.now()) return nextPollAt - Date.now();
      const checkedAt = Date.parse(job.checked_at || "");
      if (Number.isFinite(checkedAt)) {
        const wait = checkedAt + VIDEO_QUERY_INTERVAL_MS - Date.now();
        if (wait > 0) return wait;
      }
      return 0;
    }
    function formatWait(ms) {
      return Math.max(1, Math.ceil(ms / 1000)) + " 秒";
    }
    async function queryVideoJob(job, options = {}) {
      const waitMs = videoQueryWaitMs(job);
      if (!options.force && waitMs > 0) {
        setStatus("查询过于频繁，" + formatWait(waitMs) + " 后再试", "");
        return job;
      }
      const s = saveSettings();
      if (!s.apiKey) { setStatus("请先填写 API Key", "error"); openSettings(); return job; }
      let json;
      try {
        const res = await fetch("/api/agnes/videos/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            apiKey: s.apiKey,
            baseUrl: s.baseUrl,
            model: job.model || s.model || "agnes-video-v2.0",
            video_id: job.video_id,
            task_id: job.task_id || job.id,
          }),
        });
        json = await parseJson(res);
      } catch (err) {
        if (err.status === 429 || /rate limit/i.test(err.message || "")) {
          const next = { ...job, checked_at: new Date().toISOString(), next_poll_at: new Date(Date.now() + VIDEO_RATE_LIMIT_BACKOFF_MS).toISOString(), rate_limited: true };
          videoJobs = videoJobs.map(item => item.id === job.id ? next : item);
          saveVideoJobs();
          updateVideoCardInPlace(next);
          setStatus("视频查询被限频，3 分钟后自动再查", "error");
          return next;
        }
        throw err;
      }
      const data = json.data || {};
      const next = { ...job, ...data, id: job.id, kind: "video", checked_at: new Date().toISOString(), next_poll_at: "", rate_limited: false };
      if (data.error) next.error = data.error;
      if (videoIsDone(next) && !next.completed_at) {
        next.completed_at = new Date().toISOString();
        const start = timestampMs(next.started_at || next.created_at);
        if (start) next.generation_ms = Date.now() - start;
      }
      videoJobs = videoJobs.map(item => item.id === job.id ? next : item);
      saveVideoJobs();
      updateVideoCardInPlace(next);
      if (activeItem && activeItem.id === job.id) {
        activeItem = next;
        showDetail(next);
      }
      if (videoIsDone(next)) setStatus(next.video_url ? "视频已完成" : "视频任务已结束", next.video_url ? "ok" : "error");
      return next;
    }
    function startVideoPolling(id, maxChecks = 30) {
      if (videoPollTimers.has(id)) return;
      let checks = 0;
      const timer = setInterval(async () => {
        const job = videoJobs.find(item => item.id === id);
        if (!job || videoIsDone(job) || checks >= maxChecks) {
          clearInterval(timer);
          videoPollTimers.delete(id);
          return;
        }
        checks += 1;
        try {
          await queryVideoJob(job);
        } catch (_) {}
      }, VIDEO_QUERY_INTERVAL_MS);
      videoPollTimers.set(id, timer);
    }
    async function generateVideo() {
      const now = Date.now();
      if (now - lastSubmitAt < 400) return;
      lastSubmitAt = now;
      const s = saveSettings();
      if (!s.apiKey) { setStatus("请先填写 API Key", "error"); openSettings(); return; }
      if (!s.prompt.trim()) return setStatus("请填写提示词", "error");
      if (!isValidSizeValue(s.size)) return setStatus("尺寸格式应为宽x高，例如 1152x768", "error");
      const typedRawUrls = parseVideoImageUrls(s.videoImageUrls);
      const badUrl = typedRawUrls.find(url => !normalizeVideoInputUrl(url));
      if (badUrl) return setStatus("参考图必须是 http(s) URL 或 /api/images/... 站内路径", "error");
      const imageUrls = await collectVideoImageUrls(s);
      const pendingId = "video-" + now + "-" + Math.random().toString(36).slice(2, 8);
      const pending = {
        id: pendingId,
        kind: "video",
        prompt: s.prompt.trim(),
        model: s.model || "agnes-video-v2.0",
        size: s.size || "1152x768",
        num_frames: Number(s.videoFrames) || 121,
        frame_rate: Number(s.videoRate) || 24,
        image_urls: imageUrls,
        status: "creating",
        progress: 0,
        started_at: new Date(now).toISOString(),
        created_at: new Date().toISOString(),
      };
      videoJobs = [pending, ...videoJobs];
      saveVideoJobs();
      prependVideoCard(pending);
      try {
        const res = await fetch("/api/agnes/videos", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            apiKey: s.apiKey,
            baseUrl: s.baseUrl,
            model: pending.model,
            prompt: pending.prompt,
            size: pending.size,
            num_frames: pending.num_frames,
            frame_rate: pending.frame_rate,
            imageUrls,
          }),
        });
        const json = await parseJson(res);
        const data = json.data || {};
        const job = { ...pending, ...data, id: pendingId, kind: "video", status: data.status || "queued" };
        if (videoIsDone(job)) {
          job.completed_at = new Date().toISOString();
          job.generation_ms = Date.now() - now;
        }
        videoJobs = videoJobs.map(item => item.id === pendingId ? job : item);
        saveVideoJobs();
        updateVideoCardInPlace(job);
        setStatus("视频任务已创建，正在查询结果", "ok");
        if (!videoIsDone(job)) startVideoPolling(job.id);
      } catch (err) {
        const failed = videoJobs.find(item => item.id === pendingId);
        if (failed) {
          failed.status = "error";
          failed.error = err.message || String(err);
        }
        saveVideoJobs();
        if (failed) updateVideoCardInPlace(failed);
        setStatus(err.message || String(err), "error");
      }
    }
    async function generate() {
      if (activeMode === "video") return generateVideo();
      const now = Date.now();
      if (now - lastSubmitAt < 400) return;
      lastSubmitAt = now;
      const s = saveSettings();
      if (!s.apiKey) { setStatus("请先填写 API Key", "error"); openSettings(); return; }
      if (!s.prompt.trim()) return setStatus("请填写提示词", "error");
      if (!isValidSizeValue(s.size)) return setStatus("尺寸格式应为宽x高，例如 1024x768", "error");
      const inputImageDataUrls = referenceImages.map(item => item.dataUrl);
      const isEdit = inputImageDataUrls.length > 0;
      const pendingId = "pending-" + now + "-" + Math.random().toString(36).slice(2, 8);
      images = [{
        id: pendingId,
        prompt: s.prompt.trim(),
        model: s.model,
        size: s.size,
        quality: "auto",
        format: "png",
        preview_url: "",
        thumbnail_url: "",
        preview_bytes: 0,
        status: "running",
        is_partial: false,
        reference_count: inputImageDataUrls.length,
        started_at: new Date(now).toISOString(),
      }, ...images];
      renderGallery();
      updateRunningStatus();
      try {
        const res = await fetch("/api/agnes/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            apiKey: s.apiKey,
            baseUrl: s.baseUrl,
            model: s.model || "agnes-image-2.1-flash",
            prompt: s.prompt.trim(),
            size: s.size || "1024x768",
            images: inputImageDataUrls,
            response_format: s.responseFormat || "b64_json",
          }),
        });
        const json = await parseJson(res);
        const img = json.data || {};
        const outputFormat = img.format || formatFromMime(img.mimeType) || "png";
        const entry = { ...img, prompt: s.prompt.trim(), model: s.model, size: s.size, quality: "auto", format: outputFormat, streamed: false, reference_count: inputImageDataUrls.length, response_format: s.responseFormat || img.response_format || "b64_json" };
        const saved = await saveImage(entry);
        images = images.filter(item => item.id !== pendingId);
        await loadGallery();
        const completedAt = new Date().toISOString();
        images = images.map(item => item.id === saved?.id ? { ...item, started_at: new Date(now).toISOString(), completed_at: completedAt, generation_ms: Date.now() - now } : item);
        renderGallery();
        const count = runningCount();
        setStatus(count > 0 ? count + " 个任务正在生成..." : "已生成并写入服务端历史", count > 0 ? "" : "ok");
      } catch (err) {
        const message = err.message || String(err);
        const failed = images.find(item => item.id === pendingId);
        if (failed) {
          failed.status = "error";
          failed.error = message;
          failed.preview_url = "";
          failed.thumbnail_url = "";
        }
        renderGallery();
        const count = runningCount();
        setStatus(count > 0 ? count + " 个任务正在生成，另有任务失败：" + message : message, "error");
      }
    }

    const storagePanel = window.mountStoragePanel
      ? window.mountStoragePanel(els.storagePanelRoot, {
          prefix: "uploads/",
          accept: "*/*",
          onUploaded(file) {
            setStatus("云存储上传完成: " + (file.url || file.publicUrl || file.key), "ok");
          },
          onSelected(file) {
            const url = file.url || file.publicUrl || "";
            if (activeMode === "video" && url) {
              const current = els.videoImageUrls.value.trim();
              els.videoImageUrls.value = current ? current + "\n" + url : url;
              saveSettings();
              setStatus("已把云存储链接加入视频参考图 URL", "ok");
            } else if (url) {
              setStatus("已选择云存储文件: " + url, "ok");
            }
          },
        })
      : null;

    els.generate.addEventListener("click", generate);
    els.imageModeBtn.addEventListener("click", () => setMode("image"));
    els.videoModeBtn.addEventListener("click", () => setMode("video"));
    els.storageBtn.addEventListener("click", () => storagePanel?.open());
    els.refresh.addEventListener("click", () => {
      if (activeMode === "video") {
        loadVideoJobs();
        for (const job of videoJobs) if (!videoIsDone(job)) startVideoPolling(job.id, 30);
        renderGallery();
        return;
      }
      loadGallery().catch(err => setStatus(err.message || String(err), "error"));
    });
    els.loadMore.addEventListener("click", () => loadGallery({ append: true }).catch(err => setStatus(err.message || String(err), "error")));
    els.search.addEventListener("input", renderGallery);
    els.formatFilter.addEventListener("change", renderGallery);
    els.clearPrompt.addEventListener("click", () => { els.prompt.value = ""; saveSettings(); els.prompt.focus(); });
    els.attachImage.addEventListener("click", () => els.imageFile.click());
    els.imageFile.addEventListener("change", async () => {
      try {
        await addInputFiles(els.imageFile.files || []);
      } catch (err) {
        setStatus(err.message || String(err), "error");
      } finally {
        els.imageFile.value = "";
      }
    });
    els.paramsToggle.addEventListener("click", () => {
      const open = !els.composer.classList.contains("params-open");
      els.composer.classList.toggle("params-open", open);
      els.paramsToggle.setAttribute("aria-expanded", open ? "true" : "false");
    });
    els.settingsBtn.addEventListener("click", openSettings);
    els.settingsBtn2.addEventListener("click", openSettings);
    els.settingsClose.addEventListener("click", closeSettings);
    els.saveSettingsBtn.addEventListener("click", () => { saveSettings(); closeSettings(); setStatus("设置已保存", "ok"); });
    els.detailClose.addEventListener("click", closeDetail);
    els.reuseBtn.addEventListener("click", () => { reuseConfig(activeItem); closeDetail(); });
    els.settingsModal.addEventListener("click", (event) => { if (event.target === els.settingsModal) closeSettings(); });
    els.detailModal.addEventListener("click", (event) => { if (event.target === els.detailModal) closeDetail(); });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") { closeSettings(); closeDetail(); }
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") generate();
    });
    els.size.addEventListener("change", () => { updateCustomSizeVisibility(); saveSettings(); });
    els.customSize.addEventListener("input", saveSettings);
    els.customSize.addEventListener("change", saveSettings);
    els.outputUrl.addEventListener("change", saveSettings);
    for (const id of ["videoFrames","videoRate","videoImageUrls"]) {
      els[id].addEventListener("change", saveSettings);
      if (id === "videoImageUrls") els[id].addEventListener("input", saveSettings);
    }
    for (const id of ["apiKey","baseUrl","model","prompt"]) {
      els[id].addEventListener("change", saveSettings);
      if (id === "prompt") els[id].addEventListener("input", saveSettings);
    }
    loadSettings();
    loadGallery().catch(err => setStatus(err.message || String(err), "error"));
    setInterval(() => {
      if (hasLiveTimers()) updateLiveTimers();
    }, 1000);
  </script>
</body>
</html>
